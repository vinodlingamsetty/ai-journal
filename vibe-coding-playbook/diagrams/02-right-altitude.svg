<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b85450"/>
      <stop offset="35%" stop-color="#c47050"/>
      <stop offset="50%" stop-color="#5a9a5a"/>
      <stop offset="65%" stop-color="#c47050"/>
      <stop offset="100%" stop-color="#b85450"/>
    </linearGradient>
  </defs>
  
  <!-- Gradient bar -->
  <rect x="40" y="20" width="800" height="12" rx="6" fill="url(#bar)"/>
  
  <!-- Left: Too Low -->
  <rect x="30" y="50" width="240" height="190" rx="12" fill="#b85450" filter="url(#shadow2)"/>
  <text x="150" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TOO LOW</text>
  <line x1="80" y1="92" x2="220" y2="92" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="150" y="118" text-anchor="middle" font-size="12" fill="#f0d0d0">if user says X</text>
  <text x="150" y="138" text-anchor="middle" font-size="12" fill="#f0d0d0">then do Y</text>
  <text x="150" y="158" text-anchor="middle" font-size="12" fill="#f0d0d0">else if Z then W</text>
  <text x="150" y="190" text-anchor="middle" font-size="11" fill="#f0c0c0" font-style="italic">Brittle, breaks on</text>
  <text x="150" y="206" text-anchor="middle" font-size="11" fill="#f0c0c0" font-style="italic">edge cases</text>
  <text x="150" y="230" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.25)">&#x2717;</text>
  
  <!-- Center: Right Altitude -->
  <rect x="310" y="50" width="260" height="190" rx="12" fill="#5a9a5a" filter="url(#shadow2)"/>
  <rect x="310" y="50" width="260" height="190" rx="12" fill="none" stroke="#3d7a3d" stroke-width="2.5"/>
  <text x="440" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">RIGHT ALTITUDE</text>
  <line x1="350" y1="92" x2="530" y2="92" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="440" y="118" text-anchor="middle" font-size="12" fill="#d0f0d0">Specific enough to</text>
  <text x="440" y="138" text-anchor="middle" font-size="12" fill="#d0f0d0">guide behavior,</text>
  <text x="440" y="158" text-anchor="middle" font-size="12" fill="#d0f0d0">flexible enough for</text>
  <text x="440" y="178" text-anchor="middle" font-size="12" fill="#d0f0d0">good judgment</text>
  <text x="440" y="210" text-anchor="middle" font-size="11" fill="#c0e0c0" font-style="italic">Heuristics + examples</text>
  <text x="440" y="230" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.25)">&#x2713;</text>
  
  <!-- Right: Too High -->
  <rect x="610" y="50" width="240" height="190" rx="12" fill="#b85450" filter="url(#shadow2)"/>
  <text x="730" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TOO HIGH</text>
  <line x1="660" y1="92" x2="800" y2="92" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="730" y="125" text-anchor="middle" font-size="12" fill="#f0d0d0">Be helpful.</text>
  <text x="730" y="150" text-anchor="middle" font-size="12" fill="#f0d0d0">Write good code.</text>
  <text x="730" y="190" text-anchor="middle" font-size="11" fill="#f0c0c0" font-style="italic">Vague, assumes</text>
  <text x="730" y="206" text-anchor="middle" font-size="11" fill="#f0c0c0" font-style="italic">shared context</text>
  <text x="730" y="230" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.25)">&#x2717;</text>
  
  <!-- Arrows between -->
  <line x1="275" y1="145" x2="305" y2="145" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="575" y1="145" x2="605" y2="145" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>