<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
  
  <!-- AUTO-LOADED -->
  <rect x="20" y="20" width="250" height="130" rx="12" fill="#5a9a5a" filter="url(#shadow3)"/>
  <text x="145" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#d0f0d0">AUTO-LOADED (every session)</text>
  <rect x="40" y="65" width="210" height="60" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="145" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">CLAUDE.md / AGENTS.md</text>
  <text x="145" y="108" text-anchor="middle" font-size="11" fill="#c0e0c0">target: under 300 lines</text>
  
  <!-- ON-DEMAND -->
  <rect x="20" y="175" width="250" height="240" rx="12" fill="#4a90a4" filter="url(#shadow3)"/>
  <text x="145" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#d0e8f0">ON-DEMAND (agent reads when needed)</text>
  <text x="145" y="235" text-anchor="middle" font-size="12" fill="#fff">docs/architecture.md</text>
  <text x="145" y="258" text-anchor="middle" font-size="12" fill="#fff">docs/features.md</text>
  <text x="145" y="281" text-anchor="middle" font-size="12" fill="#fff">docs/design.md</text>
  <text x="145" y="304" text-anchor="middle" font-size="12" fill="#fff">docs/decisions.md</text>
  <text x="145" y="327" text-anchor="middle" font-size="12" fill="#fff">instructions/ (examples)</text>
  <text x="145" y="356" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">mistakes.md</text>
  <text x="145" y="376" text-anchor="middle" font-size="10" fill="#a0d0e0">referenced in prompts for new features</text>
  
  <!-- LLM center -->
  <rect x="360" y="160" width="160" height="160" rx="80" fill="#333" filter="url(#shadow3)"/>
  <text x="440" y="232" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">LLM</text>
  <text x="440" y="256" text-anchor="middle" font-size="11" fill="#aaa">Agent</text>
  
  <!-- AGENT WRITES TO -->
  <rect x="610" y="20" width="250" height="200" rx="12" fill="#c4a035" filter="url(#shadow3)"/>
  <text x="735" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">AGENT WRITES TO</text>
  <rect x="630" y="65" width="210" height="45" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">todo.md</text>
  <text x="735" y="100" text-anchor="middle" font-size="10" fill="#f0e0a0">attention anchor</text>
  <rect x="630" y="120" width="210" height="35" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="143" text-anchor="middle" font-size="12" fill="#fff">docs/*.md (new docs)</text>
  <rect x="630" y="165" width="210" height="35" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="188" text-anchor="middle" font-size="12" fill="#fff">src/ (code output)</text>
  
  <!-- IGNORED -->
  <rect x="610" y="250" width="250" height="100" rx="12" fill="#777" filter="url(#shadow3)"/>
  <text x="735" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd">IGNORED (.claudeignore)</text>
  <text x="735" y="310" text-anchor="middle" font-size="12" fill="#bbb">node_modules/ .env dist/</text>
  <text x="735" y="330" text-anchor="middle" font-size="10" fill="#999">never enters context</text>
  
  <!-- Arrows: auto-loaded to LLM -->
  <line x1="270" y1="85" x2="370" y2="210" stroke="#5a9a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="305" y="138" font-size="10" fill="#5a9a5a" font-weight="600">always</text>
  
  <!-- Arrow: on-demand to LLM -->
  <line x1="270" y1="300" x2="365" y2="270" stroke="#4a90a4" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="290" y="278" font-size="10" fill="#4a90a4" font-weight="600">on demand</text>
  
  <!-- Arrow: LLM to writes -->
  <line x1="510" y1="210" x2="610" y2="120" stroke="#c4a035" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="555" y="152" font-size="10" fill="#c4a035" font-weight="600">writes</text>
  
  <!-- X through ignored -->
  <line x1="585" y1="300" x2="555" y2="300" stroke="#777" stroke-width="2"/>
  <text x="575" y="304" font-size="14" fill="#777">&#x2717;</text>
</svg>